name: aiwire
description: AI News Summarised

publish_to: 'none'
version: 1.0.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  url_launcher: ^6.2.5
  timeago: ^3.6.0
  cached_network_image: ^3.3.1
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  share_plus: ^12.0.1
  flutter_staggered_animations: ^1.1.1
  like_button: ^2.1.0
  in_app_purchase: ^3.2.0
  shimmer: ^3.0.0
  sign_in_with_apple: ^6.1.2
  google_sign_in: ^6.2.2
  flutter_tts: ^4.0.2
  xml: ^6.5.0
  archive: ^4.0.4
  file_picker: ^8.1.7
  firebase_core: ^3.12.0
  firebase_analytics: ^11.6.0
  cloud_firestore: ^5.6.0
  geolocator: ^13.0.2
  youtube_explode_dart: ^3.0.5
  speech_to_text: ^7.0.0
  pdf: ^3.10.8
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  config:
    enable-lldb-debugging: false
